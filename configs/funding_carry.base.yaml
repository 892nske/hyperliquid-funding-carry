data:
  candles_path: data/raw/sample_candles.csv
  asset_context_path: data/raw/sample_asset_context.csv
  funding_path: data/raw/sample_funding.csv
strategy:
  name: funding_carry
  symbols: [BTC, ETH, HYPE]
  signal_timeframe: 1h
  execution_timeframe: 5m
  mode: spot_perp
  min_signal_interval_hours: 1
  entry:
    predicted_funding_min: 0.00015
    current_funding_min: 0.00010
    basis_min: 0.0010
    oi_change_1h_min: 0.0
    spread_bps_max: 4.0
  exit:
    basis_exit: 0.0003
    basis_stop: 0.0035
    predicted_funding_decay_ratio: 0.5
  timing:
    funding_interval_minutes: 60
    entry_lead_minutes: 60
    min_hold_minutes_after_funding: 60
    max_hold_minutes: 120
  risk:
    max_notional_pct: 0.15
    max_positions: 1
execution:
  mode: bar_close
  fee_bps_maker: 1.5
  fee_bps_taker: 4.5
  slippage_bps: 1.0
research:
  save_features: true
  save_trades: true
artifacts:
  root_dir: artifacts
